<!DOCTYPE html>
<html>
<head>

    <title>PG Booking System</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">PG Booking</a>

        <div>

            <a class="btn btn-light" href="/">Home</a>

            <a class="btn btn-light" href="/add_pg/">Add PG</a>

            <a class="btn btn-light" href="/my_bookings/">My Bookings</a>

            <a class="btn btn-success" href="/login/">Login</a>

            <a class="btn btn-warning" href="/register/">Register</a>

            <a class="btn btn-danger" href="/logout/">Logout</a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-success">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    {% block content %}

    {% endblock %}

</div>

</div>

</body>
</html>
